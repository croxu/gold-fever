<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Золотая лихорадка</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app {
            width: 100%;
            max-width: 420px;
            padding: 20px 16px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .header {
            width: 100%;
            display: flex;
            gap: 10px;
        }
        .card {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }
        .coin {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #f6c948, #ff8c00);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
        }
        .label { font-size: 11px; color: #a0a0a0; }
        .value { font-size: 20px; font-weight: 700; color: #f6c948; }
        .attempts-card {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 12px 16px;
            text-align: center;
            min-width: 60px;
        }
        .attempts-num { font-size: 28px; font-weight: 800; color: #39ff14; }
        .jackpot-box {
            width: 100%;
            background: #1a1a1a;
            border: 2px solid #f6c948;
            border-radius: 20px;
            padding: 16px;
            text-align: center;
        }
        .jackpot-label { font-size: 12px; color: #a0a0a0; }
        .jackpot-amount { font-size: 36px; font-weight: 900; color: #f6c948; }
        input {
            width: 100%;
            padding: 16px;
            font-size: 24px;
            text-align: center;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 16px;
            color: #fff;
            outline: none;
        }
        input:focus { border-color: #f6c948; }
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn:active { transform: scale(0.96); }
        .btn-gold {
            background: linear-gradient(135deg, #f6c948, #ff8c00);
            color: #000;
            font-size: 18px;
        }
        .btn-gold:disabled { background: #333; color: #666; }
        .btn-green {
            background: transparent;
            border: 2px solid #39ff14;
            color: #39ff14;
        }
        .btn-blue {
            background: transparent;
            border: 2px solid #5b9bd5;
            color: #5b9bd5;
        }
        .row { width: 100%; display: flex; gap: 10px; }
        .row .btn { flex: 1; }
        .hint { font-size: 12px; color: #a0a0a0; text-align: center; min-height: 18px; }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            border: 1px solid #f6c948;
            border-radius: 16px;
            padding: 14px 24px;
            z-index: 100;
            font-weight: 600;
            color: #f6c948;
            opacity: 0;
            transition: all 0.4s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; top: 30px; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="card">
                <div class="coin">🪙</div>
                <div>
                    <div class="label">Баланс</div>
                    <div class="value" id="balance">250</div>
                </div>
            </div>
            <div class="attempts-card">
                <div class="attempts-num" id="attempts">10</div>
                <div class="label">Попыток</div>
            </div>
        </div>

        <div class="jackpot-box">
            <div class="jackpot-label">🏆 Джекпот</div>
            <div class="jackpot-amount" id="jackpot">12 500</div>
            <div class="label">золотых монет</div>
        </div>

        <input type="number" id="guessInput" placeholder="1–1000" min="1" max="1000" inputmode="numeric">
        <div class="hint" id="hint"></div>

        <button class="btn btn-gold" id="guessBtn">🔥 Испытать удачу</button>

        <div class="row">
            <button class="btn btn-green" id="buyBtn">💎 +5 попыток</button>
            <button class="btn btn-blue" id="inviteBtn">👥 Друга</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Ждём полной загрузки страницы
        window.addEventListener('DOMContentLoaded', function() {
            // === НАСТРОЙКИ ===
            var SECRET = Math.floor(Math.random() * 1000) + 1;
            var MAX_TRIES = 10;
            var tries = MAX_TRIES;
            var balance = 250;
            var jackpot = 12500;
            var gameOver = false;

            // === ЭЛЕМЕНТЫ ===
            var attemptsEl = document.getElementById('attempts');
            var balanceEl = document.getElementById('balance');
            var jackpotEl = document.getElementById('jackpot');
            var guessInput = document.getElementById('guessInput');
            var guessBtn = document.getElementById('guessBtn');
            var buyBtn = document.getElementById('buyBtn');
            var inviteBtn = document.getElementById('inviteBtn');
            var hintEl = document.getElementById('hint');
            var toast = document.getElementById('toast');

            // === ФУНКЦИИ ===
            function formatNum(n) {
                return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
            }

            function updateUI() {
                attemptsEl.textContent = tries;
                balanceEl.textContent = formatNum(balance);
                jackpotEl.textContent = formatNum(jackpot);
                if (tries <= 0 || gameOver) {
                    guessBtn.disabled = true;
                    guessBtn.textContent = gameOver ? '🎉 ДЖЕКПОТ!' : '😔 Попытки кончились';
                } else {
                    guessBtn.disabled = false;
                    guessBtn.textContent = '🔥 Испытать удачу';
                }
            }

            function showToast(msg) {
                toast.textContent = msg;
                toast.className = 'toast show';
                clearTimeout(toast._timeout);
                toast._timeout = setTimeout(function() {
                    toast.className = 'toast';
                }, 2000);
            }

            function checkGuess() {
                if (gameOver || tries <= 0) return;

                var raw = guessInput.value.trim();
                var guess = parseInt(raw, 10);

                if (isNaN(guess) || guess < 1 || guess > 1000) {
                    hintEl.textContent = '⚠️ Введите число от 1 до 1000';
                    hintEl.style.color = '#ff3b3b';
                    return;
                }

                tries--;
                guessInput.value = '';
                hintEl.style.color = '#a0a0a0';

                if (guess === SECRET) {
                    gameOver = true;
                    hintEl.textContent = '🎉 ДЖЕКПОТ! Вы угадали число!';
                    hintEl.style.color = '#f6c948';
                    showToast('🎉 Вы угадали! +' + formatNum(jackpot) + ' монет!');
                    balance += jackpot;
                    jackpot = 0;
                    updateUI();
                } else if (tries <= 0) {
                    hintEl.textContent = '😢 Не угадали. Число: ' + SECRET;
                    hintEl.style.color = '#ff3b3b';
                    showToast('😔 Попытки закончились');
                    updateUI();
                } else {
                    var diff = Math.abs(guess - SECRET);
                    var hint = '';
                    if (guess < SECRET) {
                        hint = diff <= 50 ? '📈 Очень близко! Берите выше ↑' :
                               diff <= 200 ? '📈 Берите выше' : '📈 Сильно выше';
                    } else {
                        hint = diff <= 50 ? '📉 Очень близко! Берите ниже ↓' :
                               diff <= 200 ? '📉 Берите ниже' : '📉 Сильно ниже';
                    }
                    hintEl.textContent = hint + ' • Осталось: ' + tries;
                    hintEl.style.color = diff <= 50 ? '#f6c948' : '#a0a0a0';
                    showToast(hint);
                    updateUI();
                }
            }

            function buyAttempts() {
                tries += 5;
                updateUI();
                showToast('✅ +5 попыток!');
            }

            function inviteFriend() {
                var refLink = 'https://t.me/share/url?url=https://t.me/your_bot/app&text=💰 Джекпот ' + formatNum(jackpot) + ' монет!';
                window.open(refLink, '_blank');
                showToast('📤 Отправь ссылку другу!');
            }

            // === ПОДКЛЮЧАЕМ ОБРАБОТЧИКИ ===
            guessBtn.addEventListener('click', checkGuess);
            buyBtn.addEventListener('click', buyAttempts);
            inviteBtn.addEventListener('click', inviteFriend);

            guessInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') checkGuess();
            });

            // === СТАРТ ===
            updateUI();
            console.log('✅ Приложение запущено! Загаданное число: ' + SECRET);

            // === TELEGRAM SDK (если есть) ===
            try {
                var tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
            } catch(e) {
                console.log('Telegram SDK не загружен, но приложение работает');
            }
        });
    </script>
</body>
    </html>
